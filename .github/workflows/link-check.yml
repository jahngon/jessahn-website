name: Link Check

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --timeout 30 --max-retries 2 --no-progress ./links-to-check.md
          fail: true
          output: ./lychee/links-report.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: ./lychee/links-report.md
