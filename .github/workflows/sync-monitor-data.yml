name: Sync monitor data

# Pulls the latest state.public.json from child-credit-freeze-monitor and
# commits it into public/widget/ so the widget shows fresh "last checked"
# timestamps. Runs ~30 min after the monitor's 13:17 UTC cron so the data
# is already fresh upstream.

on:
  schedule:
    - cron: '47 13 * * *'  # 1:47pm UTC daily (~6:47am PT / 9:47am ET)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit + push public/widget/ changes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync monitor data
        run: npm run sync-monitor-data

      - name: Commit any changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/widget/state.public.json
          git diff --staged --quiet || git commit -m "chore: sync monitor data $(date -u +%Y-%m-%d)"
          git push
